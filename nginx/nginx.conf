server {
    listen 80;
    server_name _;
    client_max_body_size 20M;

    # Указываем DNS-резолвер Docker (внутренний)
    resolver 127.0.0.11 valid=10s;

    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }

    location / {
        # Используем переменную, чтобы Nginx каждый раз заново резолвил имя
        set $backend "http://web:8000";
        proxy_pass $backend;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Важно для Django: SECURE_PROXY_SSL_HEADER (production.py) читает именно
        # этот заголовок, чтобы понять, что запрос пришёл по HTTPS, даже если
        # сам gunicorn видит обычный HTTP-запрос внутри docker-сети.
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
