upstream wagtail {
    server web:8000;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 20M;

    # Static & media are written by Django/Wagtail into named volumes that
    # are shared with the "web" container (see docker-compose.prod.yml),
    # and served directly by nginx instead of going through gunicorn.
    location /static/ {
        alias /app/static/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /app/media/;
        access_log off;
        expires 7d;
    }

    location / {
        proxy_pass http://wagtail;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
