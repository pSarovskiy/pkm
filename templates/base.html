{% load static %}
<!DOCTYPE html>
<html lang="ru" class="h-100" data-bs-theme="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ SITE_NAME }}{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body class="d-flex h-100 text-center text-bg-dark">
  <div class="cover-container d-flex w-100 h-100 p-3 mx-auto flex-column">
    
    <header class="mb-auto">
      <div>
        <h3 class="float-md-start mb-0">
          <a class="logo" href="{% url 'post_list' %}">{{ SITE_NAME }}</a>
        </h3>
        <nav class="nav nav-masthead justify-content-center float-md-end">
          <a
            class="nav-link fw-bold py-1 px-0 active"
            aria-current="page"
            href="#"
            >Home</a
          >
          {% for cat in nav_categories %}
            <a class="nav-link fw-bold py-1 px-0{% if cat.slug == current_category_slug %} active{% endif %}" 
              href="{% url 'category_detail' cat.slug %}">
              {{ cat.name }}
            </a>
          {% endfor %}
        </nav>
      </div>
    </header>

    <main class="px-3">
      {% if messages %}
        {% for message in messages %}
          <div class="alert">{{ message }}</div>
        {% endfor %}
      {% endif %}
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <div class="wrap">&copy; {{ SITE_NAME }}</div>
    </footer>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
