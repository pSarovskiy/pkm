{% load wagtailimages_tags %}

<figure class="image-with-caption">
    {% image self.image fill-800x500 as img %}
    <img src="{{ img.url }}" alt="{{ img.alt }}" class="img-fluid">
    {% if self.caption %}
        <figcaption class="caption">{{ self.caption }}</figcaption>
    {% endif %}
</figure>
